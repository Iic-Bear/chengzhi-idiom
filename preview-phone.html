<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>📱 手机预览调试器 — 成知·成语卡</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e; font-family: -apple-system, 'Segoe UI', sans-serif;
    min-height: 100vh; display: flex; flex-direction: column; align-items: center;
    padding: 20px; color: #ccc;
  }
  h1 { font-size: 18px; color: #eee; margin-bottom: 4px; }
  .subtitle { font-size: 12px; color: #888; margin-bottom: 16px; }

  /* ── 控制栏 ── */
  .controls {
    display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; justify-content: center;
  }
  .controls button, .controls select {
    background: #2d2d44; color: #eee; border: 1px solid #444; border-radius: 6px;
    padding: 6px 14px; font-size: 13px; cursor: pointer;
  }
  .controls button:hover, .controls select:hover { background: #3d3d5c; }
  .controls button.active { background: #6c5ce7; border-color: #6c5ce7; }

  /* ── 手机框架 ── */
  .phone-wrapper {
    display: flex; gap: 24px; align-items: flex-start; flex-wrap: wrap; justify-content: center;
  }
  .phone-frame {
    position: relative; border-radius: 40px; padding: 12px;
    background: linear-gradient(145deg, #2a2a3a, #1a1a2a);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
  }
  .phone-notch {
    position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
    width: 120px; height: 28px; background: #1a1a2a; border-radius: 0 0 16px 16px;
    z-index: 10; display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .phone-notch::before {
    content: ''; width: 8px; height: 8px; border-radius: 50%; background: #333;
  }
  .phone-notch::after {
    content: ''; width: 40px; height: 4px; border-radius: 2px; background: #333;
  }
  .phone-screen {
    border-radius: 30px; overflow: hidden; background: #000;
    position: relative;
  }
  .phone-screen iframe {
    width: 100%; height: 100%; border: none; display: block;
  }
  .phone-home-bar {
    position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
    width: 100px; height: 4px; background: #555; border-radius: 2px; z-index: 10;
  }

  /* ── 尺寸标签 ── */
  .size-label {
    text-align: center; margin-top: 10px; font-size: 12px; color: #888;
  }
  .size-label strong { color: #aaa; font-size: 14px; }

  /* ── 尺寸预设 ── */
  /* iPhone 15 Pro: 393 x 852 */
  .phone-frame.iphone-15-pro { padding: 12px; }
  .phone-frame.iphone-15-pro .phone-screen { width: 393px; height: 852px; }

  /* iPhone SE: 375 x 667 */
  .phone-frame.iphone-se .phone-screen { width: 375px; height: 667px; }

  /* iPhone 15 Pro Max: 430 x 932 */
  .phone-frame.iphone-15-max .phone-screen { width: 430px; height: 932px; }

  /* Android 通用: 360 x 800 */
  .phone-frame.android .phone-screen { width: 360px; height: 800px; }

  /* 缩放 */
  .phone-frame.scale-75 { transform: scale(0.75); transform-origin: top center; }
  .phone-frame.scale-60 { transform: scale(0.6); transform-origin: top center; }

  /* 隐藏第二个手机 */
  .phone-frame.hidden { display: none; }
</style>
</head>
<body>

<h1>📱 手机预览调试器</h1>
<p class="subtitle">对照参考手机排版，调整字卡样式。仅用于调试，不影响成品。</p>

<div class="controls">
  <button onclick="setPreset('iphone-15-pro')" class="active" id="btn-iphone-15-pro">iPhone 15 Pro</button>
  <button onclick="triggerGuidePreview()" title="强制触发复习入口引导动画">🎬 复习引导预览</button>
  <button onclick="triggerLearnGuidePreview()" title="强制触发学习入口引导动画">📚 学习引导预览</button>
  <button onclick="setPreset('iphone-se')" id="btn-iphone-se">iPhone SE</button>
  <button onclick="setPreset('iphone-15-max')" id="btn-iphone-15-max">iPhone 15 Pro Max</button>
  <button onclick="setPreset('android')" id="btn-android">Android 360×800</button>
  <span style="color:#555;line-height:32px;">|</span>
  <button onclick="toggleSecond()" id="btn-toggle2">&#9654; 双机对比</button>
  <select onchange="setSecondPreset(this.value)" id="sel-second" style="display:none;">
    <option value="iphone-15-pro">iPhone 15 Pro</option>
    <option value="iphone-se">iPhone SE</option>
    <option value="iphone-15-max">iPhone 15 Pro Max</option>
    <option value="android">Android 360×800</option>
  </select>
</div>

<div class="phone-wrapper">
  <!-- 主手机 -->
  <div>
    <div class="phone-frame iphone-15-pro" id="phone1">
      <div class="phone-notch"></div>
      <div class="phone-screen">
        <iframe id="screen1" src="index.html"></iframe>
      </div>
      <div class="phone-home-bar"></div>
    </div>
    <div class="size-label" id="label1"><strong>393 × 852</strong> — iPhone 15 Pro</div>
  </div>

  <!-- 对比手机（默认隐藏） -->
  <div id="phone2-wrap" style="display:none;">
    <div class="phone-frame iphone-se" id="phone2">
      <div class="phone-notch"></div>
      <div class="phone-screen">
        <iframe id="screen2" src="index.html"></iframe>
      </div>
      <div class="phone-home-bar"></div>
    </div>
    <div class="size-label" id="label2"><strong>375 × 667</strong> — iPhone SE</div>
  </div>
</div>

<script>
const PRESETS = {
  'iphone-15-pro': { w: 393, h: 852, label: 'iPhone 15 Pro' },
  'iphone-se':     { w: 375, h: 667, label: 'iPhone SE' },
  'iphone-15-max': { w: 430, h: 932, label: 'iPhone 15 Pro Max' },
  'android':       { w: 360, h: 800, label: 'Android 360×800' },
};

let secondPreset = 'iphone-se';
let showSecond = false;

function setPreset(key) {
  const p = PRESETS[key];
  const frame = document.getElementById('phone1');
  const screen = frame.querySelector('.phone-screen');
  // 清除所有预设 class
  frame.className = 'phone-frame ' + key;
  // 自动缩放适配屏幕
  autoScale(frame, p.h);
  document.getElementById('label1').innerHTML = `<strong>${p.w} × ${p.h}</strong> — ${p.label}`;
  // 高亮按钮
  document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('btn-' + key);
  if (btn) btn.classList.add('active');
  // 刷新 iframe
  document.getElementById('screen1').src = 'index.html';
}

function autoScale(frame, height) {
  const avail = window.innerHeight - 160;
  frame.classList.remove('scale-75', 'scale-60');
  if (height + 60 > avail) frame.classList.add('scale-75');
  if (height * 0.75 + 60 > avail) frame.classList.add('scale-60');
}

function toggleSecond() {
  showSecond = !showSecond;
  const wrap = document.getElementById('phone2-wrap');
  const btn = document.getElementById('btn-toggle2');
  const sel = document.getElementById('sel-second');
  wrap.style.display = showSecond ? '' : 'none';
  btn.innerHTML = showSecond ? '&#9664; 隐藏对比' : '&#9654; 双机对比';
  sel.style.display = showSecond ? '' : 'none';
  if (showSecond) setSecondPreset(secondPreset);
}

function setSecondPreset(key) {
  secondPreset = key;
  const p = PRESETS[key];
  const frame = document.getElementById('phone2');
  frame.className = 'phone-frame ' + key;
  autoScale(frame, p.h);
  document.getElementById('label2').innerHTML = `<strong>${p.w} × ${p.h}</strong> — ${p.label}`;
  document.getElementById('screen2').src = 'index.html';
}

// 窗口大小变化时重新计算缩放
window.addEventListener('resize', () => {
  const p1 = document.getElementById('phone1').className.match(/iphone-\S+|android/);
  if (p1) setPreset(p1[0].replace('phone-frame ',''));
  if (showSecond) setSecondPreset(secondPreset);
});

// 引导预览：向 iframe 发送强制触发引导的消息
function triggerGuidePreview() {
  var iframe = document.getElementById('screen1');
  if (iframe && iframe.contentWindow) {
    iframe.contentWindow.postMessage('forceStartGuide', '*');
  }
  // 如果对比手机也在显示，也触发
  if (showSecond) {
    var iframe2 = document.getElementById('screen2');
    if (iframe2 && iframe2.contentWindow) {
      iframe2.contentWindow.postMessage('forceStartGuide', '*');
    }
  }
}

// 学习引导预览
function triggerLearnGuidePreview() {
  var iframe = document.getElementById('screen1');
  if (iframe && iframe.contentWindow) {
    iframe.contentWindow.postMessage('forceStartLearnGuide', '*');
  }
  if (showSecond) {
    var iframe2 = document.getElementById('screen2');
    if (iframe2 && iframe2.contentWindow) {
      iframe2.contentWindow.postMessage('forceStartLearnGuide', '*');
    }
  }
}
</script>

</body>
</html>
